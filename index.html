<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Phetsarath&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <style>
    body { font-family: 'Phetsarath', sans-serif; padding: 20px; background-color: #f8f9fa; }
    .card { margin-bottom: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .header { background: #007bff; color: white; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
    #appContent { display: none; }
    #loginSection { max-width: 400px; margin: 80px auto; }
    .lang-switcher { 
      text-align: center;
      margin-bottom: 15px;
    }
    #loader {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(4px);
      z-index: 9999;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .row-waiting { background-color: #ffe5e5 !important; } /* ສີແດງອ່ອນສຳລັບລໍຖ້າຊ້ອມ */
  </style>
</head>
<body>
<div id="loader">
  <div class="spinner-grow text-primary" style="width: 3.5rem; height: 3.5rem;" role="status"></div>
  <div class="mt-3 h5 text-primary fw-bold" data-i18n="processing">ກຳລັງປະມວນຜົນ...</div>
</div>

<!-- Modal ສຳລັບລາຍງານບັນຫາ -->
<div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="reportModalLabel" data-i18n="modalTitleNew">📝 ສົ່ງລາຍງານບັນຫາໃໝ່</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="reportForm">
          <input type="hidden" id="editItemId">
          <div class="mb-3">
            <label class="form-label" data-i18n="labelIssue">ລາຍການບັນຫາ:</label>
            <input type="text" id="issue" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label" data-i18n="labelLocation">ສະຖານທີ່:</label>
            <input type="text" id="location" class="form-control" required>
          </div>
          <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="btnCancel">ຍົກເລີກ</button>
            <button type="submit" id="reportFormButton" class="btn btn-primary" data-i18n="btnSubmit">ສົ່ງລາຍງານ</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Modal ສຳລັບກັ່ນຕອງວັນທີ Export Excel -->
<div class="modal fade" id="exportModal" tabindex="-1" aria-labelledby="exportModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exportModalLabel" data-i18n="modalExportTitle">📅 ເລືອກຊ່ວງວັນທີເພື່ອດາວໂຫຼດ Excel</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="exportForm">
          <div class="mb-3">
            <label class="form-label" data-i18n="labelStartDate">ວັນທີເລີ່ມຕົ້ນ:</label>
            <input type="text" id="startDate" class="form-control" placeholder="dd/mm/yyyy" required>
          </div>
          <div class="mb-3">
            <label class="form-label" data-i18n="labelEndDate">ວັນທີສິ້ນສຸດ:</label>
            <input type="text" id="endDate" class="form-control" placeholder="dd/mm/yyyy" required>
          </div>
          <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="btnCancel">ຍົກເລີກ</button>
            <button type="submit" class="btn btn-success" data-i18n="btnConfirmExport">ຢືນຢັນການດາວໂຫຼດ</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- ສ່ວນການເຂົ້າລະບົບ (Login Screen) -->
<div id="loginSection">
  <div class="card p-4 shadow-sm border-0">
    <h3 class="text-center mb-4" data-i18n="loginHeader">ເຂົ້າສູ່ລະບົບ</h3>
    <form id="loginForm">
      <div class="mb-3 text-start">
        <label class="form-label" data-i18n="labelFullName">ຊື່ ແລະ ນາມສະກຸນ:</label>
        <input type="text" id="userName" class="form-control" required>
      </div>
      <div class="lang-switcher">
        <button class="lang-btn btn btn-sm btn-outline-secondary" onclick="switchLang('lo')">🇱🇦 ລາວ</button>
        <button class="lang-btn btn btn-sm btn-outline-secondary" onclick="switchLang('en')">🇺🇸 EN</button>
      </div>
      <button type="submit" class="btn btn-primary w-100" data-i18n="btnLogin">ເຂົ້າສູ່ລະບົບ</button>
    </form>
  </div>
</div>

<!-- ສ່ວນເນື້ອຫາຫຼັກຂອງລະບົບ (Main Content) -->
<div id="appContent" class="container">
  <div class="header text-center">
    <div class="d-flex justify-content-between align-items-center px-3">
      <div style="width: 80px;"></div>
      <h2 class="mb-0" data-i18n="appTitle">ລະບົບລາຍງານບັນຫາ ແລະ ການຊ້ອມແປງ</h2>
      <button class="btn btn-sm btn-outline-light" onclick="logout()" data-i18n="btnLogout">ອອກລະບົບ</button>
    </div>
    <div id="userInfoDisplay" class="mt-2 small text-light opacity-75"></div>
  </div>

  <!-- ປຸ່ມຈັດການ (ຊ່ອນ/ສະແດງ ຕາມສິດ) -->
  <div class="mb-3 d-flex justify-content-end gap-2">
    <button class="btn btn-outline-success" onclick="exportToExcel()" data-i18n="btnExport">
      📥 Export Excel
    </button>
    <button id="addReportBtn" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#reportModal" data-i18n="btnAddReport">
      ➕ ສົ່ງລາຍງານບັນຫາໃໝ່
    </button>
  </div>

  <!-- ຕາຕະລາງສະແດງຂໍ້ມູນ -->
  <div class="card p-4">
    <h4 data-i18n="tableHeader">📋 ລາຍການບັນຫາທັງໝົດ</h4>
    <div class="table-responsive">
      <table class="table table-bordered table-striped text-nowrap">
        <thead class="table-dark">
          <tr>
            <th data-i18n="colSeq">ລຳດັບ</th>
            <th data-i18n="colReportId">ID ລາຍງານ</th>
            <th data-i18n="colIssue">ບັນຫາ</th>
            <th data-i18n="colLocation">ສະຖານທີ່</th>
            <th data-i18n="colDateReport">ວັນທີລາຍງານ</th>
            <th data-i18n="colReporter">ຜູ້ລາຍງານ</th>
            <th data-i18n="colDateProcess">ວັນທີດຳເນີນການ</th>
            <th data-i18n="colRepairer">ຜູ້ຊ້ອມແປງ</th>
            <th data-i18n="colStatus">ສະຖານະ</th>
            <th data-i18n="colAction">ຈັດການ</th>
          </tr>
        </thead>
        <tbody id="dataTable">
          <!-- ຂໍ້ມູນຈະມາສະແດງຢູ່ບ່ອນນີ້ -->
        </tbody>
      </table>
    </div>
    <nav aria-label="Page navigation">
      <ul class="pagination justify-content-center mt-3" id="paginationControls">
        <!-- Pagination buttons will be inserted here by JavaScript -->
      </ul>
    </nav>
  </div>
</div>

  // ແທນທີ່ດ້ວຍ URL ທີ່ໄດ້ຈາກການ Deploy (Web App URL)

      btnLogout: "ອອກລະບົບ",
      filterAll: "ລາຍການທັງໝົດ",
      filterNew: "ລາຍການເພີ່ມໃໝ່",
      filterRepairing: "ກຳລັງຊ້ອມແປງ",
      filterMyTasks: "ວຽກຊ້ອມຂອງຂ້ອຍ",
      filterCompleted: "ປະຫວັດສຳເລັດທັງໝົດ",
      btnAddReport: "➕ ສົ່ງລາຍງານບັນຫາໃໝ່",

      colReportId: "ID ລາຍງານ",

      colReporter: "ຜູ້ລາຍງານ", colDateProcess: "ວັນທີດຳເນີນການ",

      statusWaiting: "ລໍຖ້າຊ້ອມແປງ", statusRepairing: "ກຳລັງຊ້ອມແປງ", statusCompleted: "ສຳເລັດແລ້ວ",

      prevPage: "ກ່ອນໜ້າ", nextPage: "ຖັດໄປ", page: "ໜ້າ", of: "ຈາກ",

      msgConfirmAccept: "ຢືນຢັນການຮັບວຽກຊ້ອມແປງ?",

      msgNoPermission: "ຂໍອະໄພ, ຊ່າງຊ້ອມແປງບໍ່ມີສິດສົ່ງລາຍງານບັນຫາໃໝ່.",
      modalExportTitle: "📅 ເລືອກຊ່ວງວັນທີເພື່ອດາວໂຫຼດ Excel",
      labelStartDate: "ວັນທີເລີ່ມຕົ້ນ (ວວ/ດດ/ປປປປ):",
      labelEndDate: "ວັນທີສິ້ນສຸດ (ວວ/ດດ/ປປປປ):",

    },
    en: {

      modalTitleNew: "📝 Report New Issue",

      msgSuccessEdit: "Updated successfully!",
      labelIssue: "Issue Detail:",

      optSelectPosition: "-- Select Position --",
      roleReporter: "Reporter",

      btnLogin: "Login",
      appTitle: "Repair Tracking System",
      btnLogout: "Logout",
      filterAll: "All Tasks",
      filterNew: "New Tasks",
      filterRepairing: "Repairing",
      filterMyTasks: "My Tasks",
      filterCompleted: "Completed History",
      btnAddReport: "➕ Report New Issue",
      colSeq: "Order",
      colReportId: "Report ID",
      tableHeader: "📋 All Maintenance Tasks",
      colIssue: "Issue", colLocation: "Location", colDateReport: "Date Reported", 
      colReporter: "Reporter", colDateProcess: "Process Date", 
      colRepairer: "Repairer", colStatus: "Status", colAction: "Action",
      statusWaiting: "Waiting", statusRepairing: "Repairing", statusCompleted: "Completed",
      btnAccept: "Accept", btnClose: "Close", btnEdit: "Edit", btnDelete: "Delete", 
      prevPage: "Previous", nextPage: "Next", page: "Page", of: "of",
      userLabel: "User", posLabel: "Position",
      btnExport: "📥 Export Excel",
      msgConfirmDelete: "Are you sure you want to delete this report?", 
      msgConfirmAccept: "Confirm to accept this task?",
      msgConfirmComplete: "Confirm to complete this task?",
      msgNoPermission: "Sorry, repairer cannot report new issues.",
      modalExportTitle: "📅 Select Date Range for Excel Export",
      labelStartDate: "Start Date (dd/mm/yyyy):",
      labelEndDate: "End Date (dd/mm/yyyy):",
      btnConfirmExport: "Confirm Export"
    }
  };

  let currentUser = null;
  let currentLang = localStorage.getItem('repair_lang') || 'lo';
  let currentFilter = 'all';
  let rawData = []; // ເກັບຂໍ້ມູນດິບໄວ້ໃຊ້ໃນການ Export
  let currentPage = 1; // ໜ້າປັດຈຸບັນ
  const itemsPerPage = 15; // ຈຳນວນລາຍການຕໍ່ໜ້າ
  let lastDataJson = ""; // ເກັບຂໍ້ມູນເກົ່າໄວ້ປຽບທຽບ
  let lastFilterState = ""; // ເກັບສະຖານະ Filter ເກົ່າໄວ້ປຽບທຽບ
  let isFetching = false; // ປ້ອງກັນການ Fetch ຊ້ຳຊ້ອນ

  // ກວດສອບການເຂົ້າລະບົບເມື່ອໂຫຼດໜ້າເວັບ
  document.addEventListener('DOMContentLoaded', () => {
    applyTranslations();
    const savedUser = localStorage.getItem('repair_system_user');
    if (savedUser) {
      currentUser = JSON.parse(savedUser);
      showMainContent();
      loadData(true); // ໂຫຼດເທື່ອທຳອິດໃຫ້ສະແດງ Spinner
    }

    // ລ້າງຟອມເມື່ອປິດ Modal
    const modalEl = document.getElementById('reportModal');
    modalEl.addEventListener('hidden.bs.modal', cancelEdit);

    // ຕັ້ງຄ່າເລີ່ມຕົ້ນໃຫ້ວັນທີໃນ Export Modal
    setDefaultExportDates();

    // ຕັ້ງເວລາໃຫ້ກວດສອບຂໍ້ມູນໃໝ່ທຸກໆ 5 ວິນາທີ (ປັບໃຫ້ສະຖຽນຂຶ້ນ)
    setInterval(() => {
      if (currentUser) loadData(false); 
    }, 5000);
  });

  function setDefaultExportDates() {
    const today = new Date();
    const lastWeek = new Date();
    lastWeek.setDate(today.getDate() - 7); // ຄິດໄລ່ 7 ວັນກ່ອນໜ້າ

    const formatDate = (d) => String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + d.getFullYear();

    const startInput = document.getElementById('startDate');
    const endInput = document.getElementById('endDate');
    if (startInput) startInput.value = formatDate(lastWeek);
    if (endInput) endInput.value = formatDate(today);
  }

  function switchLang(lang) {
    currentLang = lang;
    localStorage.setItem('repair_lang', lang);
    applyTranslations();
    if (currentUser) showMainContent();
    loadData(false);
  }

  function applyTranslations() {
    const langData = i18n[currentLang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (langData[key]) el.innerText = langData[key];
    });
  }

  function showMainContent() {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('appContent').style.display = 'block';
    const userPos = "ຜູ້ລາຍງານ"; // ຟິກຕຳແໜ່ງສຳລັບໄຟລ໌ນີ້
    const langData = i18n[currentLang];
    const displayPos = langData.roleReporter;
    document.getElementById('userInfoDisplay').innerText = `${langData.userLabel}: ${currentUser.name} | ${langData.posLabel}: ${displayPos}`;
  }

  function setFilter(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('#repairerMenu .dropdown-item').forEach(item => item.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('filterDropdownButton').innerHTML = el.innerHTML;
    loadData(false);
  }

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('userName').value;
    const position = "ຜູ້ລາຍງານ";
    
    currentUser = { name, position };
    localStorage.setItem('repair_system_user', JSON.stringify(currentUser));
    showMainContent();
    loadData(true);
  });

  function logout() {
    localStorage.removeItem('repair_system_user');
    location.reload(); 
  }

  function toggleLoader(show) {
    document.getElementById('loader').style.display = show ? 'flex' : 'none';
  }

  function handleError(error) {
    toggleLoader(false);
    isFetching = false;
    
    // ຖ້າ Error ເກີດຈາກການ Refresh ຫຼື ຍົກເລີກ Fetch ບໍ່ຕ້ອງໃຫ້ Alert
    if (error.name === 'TypeError' && error.message === 'Failed to fetch') {
      console.warn("Network request failed or was aborted.");
    } else {
      alert("ເກີດຂໍ້ຜິດພາດ: " + error.message);
    }
  }

  // ຟັງຊັນບັນທຶກລາຍງານ
  document.getElementById('reportForm').addEventListener('submit', function(e) {
    e.preventDefault();
    if (isFetching) return;
    
    if (currentUser.position.trim() === 'ຊ່າງຊ້ອມແປງ') {
      alert(i18n[currentLang].msgNoPermission);
      return;
    }

    const itemId = document.getElementById('editItemId').value;
    toggleLoader(true);
    isFetching = true;
    
    const reportData = {
      issue: document.getElementById('issue').value,
      location: document.getElementById('location').value,
      reporter: currentUser.name // ໃຊ້ຊື່ຈາກຜູ້ໃຊ້ທີ່ເຂົ້າລະບົບໂດຍກົງ
    };
    
    let actionType = itemId ? 'edit' : 'save';
    let payload = itemId 
      ? { action: 'edit', id: itemId, issue: reportData.issue, location: reportData.location, reporterName: currentUser.name }
      : { action: 'save', data: reportData };

    fetch(WEB_APP_URL, {
      method: 'POST',
      // ບໍ່ໃສ່ headers ເພື່ອປ້ອງກັນ CORS Preflight Error
      body: JSON.stringify(payload)
    })
    .then(response => response.json()) // ປ່ຽນເປັນອ່ານ JSON Response
    .then(data => {
      toggleLoader(false);
      isFetching = false;
      if (data.status === 'success') {
        alert(itemId ? i18n[currentLang].msgSuccessEdit : i18n[currentLang].msgSuccessReport);
        const modalInstance = bootstrap.Modal.getInstance(document.getElementById('reportModal'));
        if (modalInstance) modalInstance.hide();
        loadData();
      } else {
        alert("ຂໍ້ຜິດພາດ: " + data.message);
      }
    })
    .catch(handleError);
  });

  function editReportForm(id, issue, location) {
    document.getElementById('editItemId').value = id;
    document.getElementById('issue').value = issue;
    document.getElementById('location').value = location;
    document.getElementById('reportFormButton').innerText = i18n[currentLang].btnUpdate;
    document.getElementById('reportModalLabel').innerText = i18n[currentLang].modalTitleEdit;
    new bootstrap.Modal(document.getElementById('reportModal')).show();
  }

  function cancelEdit() {
    document.getElementById('reportForm').reset();
    document.getElementById('editItemId').value = '';
    document.getElementById('reportFormButton').innerText = i18n[currentLang].btnSubmit;
    document.getElementById('reportModalLabel').innerText = i18n[currentLang].modalTitleNew;
  }

  function deleteReport(id) {
    if (confirm(i18n[currentLang].msgConfirmDelete)) {
      if (isFetching) return;
      toggleLoader(true);
      isFetching = true;

      fetch(WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({ 
          action: 'delete', 
          id: id, 
          reporterName: currentUser.name 
        })
      })
      .then(response => response.json())
      .then(data => {
        toggleLoader(false);
        isFetching = false;
        if (data.status === 'success') {
          alert(data.message);
          loadData();
        } else {
          alert("ຂໍ້ຜິດພາດ: " + data.message);
        }
      })
      .catch(handleError);
    }
  }

  // ຟັງຊັນຈັດການການກັ່ນຕອງວັນທີກ່ອນ Export
  document.getElementById('exportForm').addEventListener('submit', function(e) {
    e.preventDefault();
    confirmExport();
  });

  function exportToExcel() {
    if (rawData.length === 0) return alert("ບໍ່ມີຂໍ້ມູນໃນການ Export");
    new bootstrap.Modal(document.getElementById('exportModal')).show();
  }

  function confirmExport() {
    const startDateVal = document.getElementById('startDate').value;
    const endDateVal = document.getElementById('endDate').value;
    
    const parseReportDate = (dateStr) => {
      if (!dateStr) return new Date(0);
      // dateStr format: dd/MM/yyyy HH:mm:ss
      const datePart = dateStr.split(' ')[0];
      const parts = datePart.split('/');
      if (parts.length !== 3) return new Date(0);
      return new Date(parts[2], parts[1] - 1, parts[0]);
    };

    const start = parseReportDate(startDateVal);
    start.setHours(0,0,0,0);
    const end = parseReportDate(endDateVal);
    end.setHours(23,59,59,999);

    const filteredData = rawData.filter(row => {
      const reportDate = parseReportDate(row[3]);
      return reportDate >= start && reportDate <= end;
    });

    if (filteredData.length === 0) {
      alert(currentLang === 'lo' ? "ບໍ່ມີຂໍ້ມູນໃນຊ່ວງວັນທີທີ່ເລືອກ" : "No data found in selected date range");
      return;
    }

    const langData = i18n[currentLang];
    const headers = [
      langData.colReportId, 
      langData.colIssue, langData.colLocation, langData.colDateReport, 
      langData.colReporter, langData.colDateProcess, langData.colRepairer, langData.colStatus
    ];

    const exportData = filteredData.map(row => {
      const status = row[8] || 'ລໍຖ້າຊ້ອມແປງ';
      let translatedStatus = status;
      if (status === 'ລໍຖ້າຊ້ອມແປງ') translatedStatus = langData.statusWaiting;
      else if (status === 'ກຳລັງຊ້ອມແປງ') translatedStatus = langData.statusRepairing;
      else if (status === 'ສຳເລັດແລ້ວ') translatedStatus = langData.statusCompleted;
      
      return [
        row[0], // ID
        row[1], row[2], row[3], row[4], 
        (status === 'ສຳເລັດແລ້ວ' ? row[6] : (status === 'ກຳລັງຊ້ອມແປງ' ? row[5] : '')), 
        row[7], 
        translatedStatus
      ];
    });

    const worksheet = XLSX.utils.aoa_to_sheet([headers, ...exportData]);
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Reports");
    
    const fileName = `Repair_Report_${startDateVal.replace(/\//g, '-')}_to_${endDateVal.replace(/\//g, '-')}.xlsx`;
    XLSX.writeFile(workbook, fileName);

    const modalInstance = bootstrap.Modal.getInstance(document.getElementById('exportModal'));
    if (modalInstance) modalInstance.hide();
  }

  function loadData(showSpinner = false) {
    if (isFetching) return; // ຖ້າກຳລັງໂຫຼດຢູ່ ບໍ່ຕ້ອງເຮັດຊ້ຳ
    if (showSpinner) toggleLoader(true);
    isFetching = true;
    
    fetch(WEB_APP_URL + "?action=read")
      .then(response => response.json())
      .then(jsonResponse => {
        if (showSpinner) toggleLoader(false);
        isFetching = false;
        
        if (jsonResponse.status === 'error') {
          alert("ຂໍ້ຜິດພາດໃນການໂຫຼດຂໍ້ມູນ: " + jsonResponse.message);
          return;
        }

        const data = jsonResponse.data.map(row => {
          const toDDMM = (str) => {
            if (!str || !str.includes('/')) return str;
            const p = str.split(' '), d = p[0].split('/');
            return d.length === 3 ? `${d[1]}/${d[0]}/${d[2]}${p[1] ? ' ' + p[1] : ''}` : str;
          };
          return row.map((val, idx) => (idx === 3 || idx === 5 || idx === 6) ? toDDMM(val) : val);
        });
        data.reverse();
        
        const currentJson = JSON.stringify(data);
        if (currentJson === lastDataJson && currentFilter === lastFilterState) return;
        
        lastDataJson = currentJson;
        lastFilterState = currentFilter;
        rawData = data;
        renderTable();
      }).catch(handleError);
  }

  function renderTable() {
    const langData = i18n[currentLang];
    const tbody = document.getElementById('dataTable');
    tbody.innerHTML = '';

    const startIndex = (currentPage - 1) * itemsPerPage;
    const endIndex = startIndex + itemsPerPage;
    const paginatedData = rawData.slice(startIndex, endIndex);

    paginatedData.forEach((row, index) => {
      const status = row[8] || 'ລໍຖ້າຊ້ອມແປງ';
      let statusText = status === 'ລໍຖ້າຊ້ອມແປງ' ? langData.statusWaiting : (status === 'ກຳລັງຊ້ອມແປງ' ? langData.statusRepairing : langData.statusCompleted);

      const tr = document.createElement('tr');
      if (status === 'ລໍຖ້າຊ້ອມແປງ') tr.classList.add('row-waiting');

      let actionBtn = '';
      if (row[4] === currentUser.name && status === 'ລໍຖ້າຊ້ອມແປງ') {
        actionBtn = `
          <button class="btn btn-sm btn-warning me-1" onclick="editReportForm('${row[0]}', '${row[1]}', '${row[2]}')">${langData.btnEdit}</button>
          <button class="btn btn-sm btn-danger" onclick="deleteReport('${row[0]}')">${langData.btnDelete}</button>
        `;
      } else {
        actionBtn = status === 'ສຳເລັດແລ້ວ' ? '✅' : '⏳';
      }

      const statusClass = status === 'ລໍຖ້າຊ້ອມແປງ' ? 'text-danger' : (status === 'ກຳລັງຊ້ອມແປງ' ? 'text-warning' : 'text-success');
      tr.innerHTML = `
        <td>${startIndex + index + 1}</td>
        <td>${row[0]}</td>
        <td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td>
        <td>${(status === 'ສຳເລັດແລ້ວ' && row[6]) ? row[6] : (row[5] || '-')}</td>
        <td>${row[7] || '-'}</td>
        <td class="fw-bold ${statusClass}">${statusText}</td>
        <td class="text-center">${actionBtn}</td>
      `;
      tbody.appendChild(tr);
    });
    updatePaginationControls(rawData.length);
  }

  function updatePaginationControls(totalItems) {
    const totalPages = Math.ceil(totalItems / itemsPerPage);
    const paginationContainer = document.getElementById('paginationControls');
    if (!paginationContainer) return;

    paginationContainer.innerHTML = ''; // ລຶບປຸ່ມເກົ່າອອກ

    if (totalPages <= 1) {
      // ບໍ່ຈຳເປັນຕ້ອງມີ Pagination ຖ້າມີໜ້າດຽວ
      return;
    }

    const langData = i18n[currentLang];

    const prevButton = document.createElement('li');
    prevButton.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
    prevButton.innerHTML = `<a class="page-link" href="#" onclick="prevPage(event)">${langData.prevPage}</a>`;
    paginationContainer.appendChild(prevButton);

    const pageInfo = document.createElement('li');
    pageInfo.className = 'page-item disabled';
    pageInfo.innerHTML = `<a class="page-link" href="#">${langData.page} ${currentPage} ${langData.of} ${totalPages}</a>`;
    paginationContainer.appendChild(pageInfo);

    const nextButton = document.createElement('li');
    nextButton.className = `page-item ${currentPage === totalPages ? 'disabled' : ''}`;
    nextButton.innerHTML = `<a class="page-link" href="#" onclick="nextPage(event)">${langData.nextPage}</a>`;
    paginationContainer.appendChild(nextButton);
  }

  function nextPage(event) {
    event.preventDefault();
    const totalPages = Math.ceil(rawData.length / itemsPerPage);
    if (currentPage < totalPages) {
      currentPage++;
      renderTable();
    }
  }

  function prevPage(event) {
    event.preventDefault();
    if (currentPage > 1) {
      currentPage--;
      renderTable();
    }
  }

  function updateStatus(id, action) {
    const confirmMsg = action === 'accept' ? i18n[currentLang].msgConfirmAccept : i18n[currentLang].msgConfirmComplete;
    if (confirm(confirmMsg)) {
      toggleLoader(true);
      fetch(WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({ 
          action: 'update', 
          id: id, 
          repairer: currentUser.name, 
          statusAction: action 
        })
      })
      .then(response => response.json())
      .then(data => {
        toggleLoader(false);
        if (data.status === 'success') {
          alert(data.message);
          loadData();
        } else {
          alert("ຂໍ້ຜິດພາດ: " + data.message);
        }
      })
      .catch(handleError);
    }
  }
</script>
</body>
